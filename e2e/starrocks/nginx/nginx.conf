worker_processes 1;
events { worker_connections 1024; }

http {
    # Map StarRocks's plain ES URLs to Quickwit's /api/v1/_elastic/ prefix.
    server {
        listen 9200;
        server_name _;

        # Larger buffers since _bulk and _msearch payloads can be big.
        client_max_body_size 64m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # GET /  -> GET /api/v1/_elastic
        location = / {
            proxy_pass http://quickwit:7280/api/v1/_elastic;
            proxy_set_header Host $host;
        }

        # Anything else: prepend /api/v1/_elastic.
        # The trailing $1 reproduces the original path, so
        # /<index>/_search becomes /api/v1/_elastic/<index>/_search,
        # /_nodes/http becomes /api/v1/_elastic/_nodes/http, etc.
        location / {
            rewrite ^(.*)$ /api/v1/_elastic$1 break;
            proxy_pass http://quickwit:7280;
            proxy_set_header Host $host;
        }
    }
}
