name: quickwit-starrocks-e2e

networks:
  default:
    name: quickwit-starrocks-net

services:
  quickwit:
    image: quickwit/quickwit:${QW_VERSION:-0.8.0}
    container_name: qw_starrocks_qw
    command: ["run"]
    environment:
      QW_ENABLE_OPENTELEMETRY_OTLP_EXPORTER: "false"
      NO_COLOR: "true"
      RUST_LOG: "info"
    ports:
      - "127.0.0.1:7280:7280"
    healthcheck:
      # The edge image does not ship curl/wget; use bash's /dev/tcp probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/7280 && printf 'GET /api/v1/_elastic HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 3s
      timeout: 5s
      retries: 30

  # ES-compat shim. Two responsibilities:
  #   1. Translate standard ES URLs (/, /<index>/_search, /_search/scroll, ...)
  #      to Quickwit's /api/v1/_elastic/... routes.
  #   2. Patch over known response-shape gaps (currently: inject the
  #      `state` field that StarRocks's _search_shards parser requires).
  # Once Quickwit emits the missing fields natively, this shim becomes a
  # plain path-translation proxy and could be replaced with nginx alone.
  es_proxy:
    build:
      context: ./proxy
    container_name: qw_starrocks_proxy
    depends_on:
      quickwit:
        condition: service_healthy
    environment:
      UPSTREAM: "http://quickwit:7280"
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:9200/\").status==200 else 1)'"]
      interval: 3s
      timeout: 5s
      retries: 30

  starrocks:
    # AllInOne image bundles FE + BE in a single container; sufficient for
    # functional tests of the ES catalog connector.
    image: starrocks/allin1-ubuntu:${SR_VERSION:-3.3-latest}
    container_name: qw_starrocks_sr
    depends_on:
      es_proxy:
        condition: service_healthy
    # StarRocks BE expects nofile >= 60000. The daemon will set the
    # limit if the host kernel allows it; if it doesn't (e.g. running
    # inside a constrained sandbox), only the FE will stay up, which is
    # still enough to verify catalog creation + metadata SQL. SELECT
    # queries require a healthy BE.
    ports:
      - "127.0.0.1:9030:9030"   # MySQL protocol (FE)
      - "127.0.0.1:8030:8030"   # FE HTTP
      - "127.0.0.1:8040:8040"   # BE HTTP
    healthcheck:
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -P9030 -uroot -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 60
